<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STORMED HUB | Token Access</title>
    <link rel="icon" type="image/png" href="images/StormedGroup.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="snow" aria-hidden="true"></canvas>

    <main class="page token-page">
      <nav class="nav">
        <div class="brand">STORMED HUB</div>
        <div class="tag">Token Access</div>
      </nav>

      <section class="panel token-panel">
        <div class="panel-title">Authorized Accounts</div>
        <p class="panel-copy">Sign in with Google to view the current token.</p>

        <div class="auth-row">
          <button id="login-button" class="auth-button">Sign in with Google</button>
          <button id="logout-button" class="auth-button ghost" hidden>
            Log out
          </button>
        </div>
        <div id="gsi-button" class="gsi"></div>

        <div class="token-box">
          <div class="token-label">Current Token</div>
          <div id="token-value" class="token-value">Sign in to view</div>
          <div id="token-meta" class="token-meta"></div>
        </div>
      </section>

      <footer class="footer">
        Stormed Hub. <a class="footer-link" href="index.html">Back</a>
      </footer>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="token.js"></script>
    <script src="script.js"></script>
  </body>
</html>
