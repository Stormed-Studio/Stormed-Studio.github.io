<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STORMED HUB | Token Access</title>
    <link rel="icon" type="image/png" href="images/StormedGroup.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="snow" aria-hidden="true"></canvas>

    <main class="page token-page">
      <nav class="nav">
        <div class="brand">STORMED HUB</div>
        <div class="tag">Token Access</div>
      </nav>

      <section class="panel token-panel">
        <div class="panel-title">Authorized Accounts</div>
        <p class="panel-copy">Enter your account to view the current token.</p>

        <form id="auth-form" class="auth-form">
          <input
            id="auth-username"
            class="auth-input"
            type="text"
            autocomplete="username"
            placeholder="Username"
            required
          />
          <input
            id="auth-password"
            class="auth-input"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
            required
          />
          <div class="auth-row">
            <button id="login-button" class="auth-button" type="submit">
              Sign in
            </button>
            <button id="logout-button" class="auth-button ghost" type="button" hidden>
              Log out
            </button>
          </div>
        </form>

        <div class="token-box">
          <div class="token-label">Current Token</div>
          <div id="token-value" class="token-value">Sign in to view</div>
          <div id="token-meta" class="token-meta"></div>
          <div id="user-meta" class="token-meta"></div>
        </div>
      </section>

      <footer class="footer">
        Stormed Hub. <a class="footer-link" href="index.html">Back</a>
      </footer>
    </main>

    <script src="token.js?v=20260310"></script>
    <script src="script.js"></script>
  </body>
</html>
